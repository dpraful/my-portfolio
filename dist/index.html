<body>
  <div id="root"></div>
  <script type="text/javascript">
    // Decode query parameters back to path for SPA routing
    (function (l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        // Remove trailing slash from pathname and append decoded path
        var basePath = l.pathname.endsWith('/') ? l.pathname.slice(0, -1) : l.pathname;
        window.history.replaceState(null, null, basePath + decoded + l.hash);
      }
    })(window.location);
  </script>
</body>
